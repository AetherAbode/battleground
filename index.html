<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sandbox IDE</title>

  <!-- CodeMirror -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/indent-fold.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/javascript-hint.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>

  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>

  <!-- Pyodide (loaded async) -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>

  <!-- Font & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; background:#0b0e14; font-family:'Inter',sans-serif; color:#e0e8f0; overflow:hidden; }

    #app {
      display:flex;
      flex-direction:column;
      height:100vh;
      background:#0b0e14;
    }

    /* Top bar */
    #topbar {
      flex-shrink:0;
      height:44px;
      background:rgba(11,14,20,0.9);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.06);
      display:flex;
      align-items:center;
      padding:0 16px;
      gap:12px;
      z-index:10;
    }
    #topbar .brand { font-weight:700; font-size:16px; color:#7ae0b0; display:flex; align-items:center; gap:8px; }
    #topbar .brand i { font-size:18px; }
    #topbar .spacer { flex:1; }
    #topbar .status { display:flex; align-items:center; gap:12px; font-size:12px; color:#8899b0; }
    #topbar .status .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#4caf50; box-shadow:0 0 8px rgba(76,175,80,0.4); }
    #topbar .status .dot.off { background:#555; box-shadow:none; }

    /* Main layout */
    #main {
      display:flex;
      flex:1;
      overflow:hidden;
    }

    /* Sidebar */
    #sidebar {
      width:220px;
      min-width:160px;
      background:rgba(20,26,36,0.85);
      backdrop-filter:blur(8px);
      border-right:1px solid rgba(255,255,255,0.06);
      padding:10px 8px;
      overflow-y:auto;
      flex-shrink:0;
    }
    #sidebar .title { font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:#8899b0; margin:0 0 6px 8px; }
    .tree-item {
      padding:3px 8px;
      cursor:pointer;
      border-radius:4px;
      display:flex;
      align-items:center;
      gap:6px;
      font-size:13px;
      color:#c8d0dc;
      transition:background 0.15s;
    }
    .tree-item:hover { background:rgba(255,255,255,0.05); }
    .tree-item.active { background:rgba(122,162,247,0.12); color:#7aa2f7; }
    .tree-item .icon { width:18px; text-align:center; opacity:0.7; }
    .tree-item .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tree-item .del { background:none; border:none; color:#6a7a90; cursor:pointer; opacity:0; padding:0 4px; }
    .tree-item:hover .del { opacity:1; }
    .tree-item .del:hover { color:#f28b82; }
    .tree-children { padding-left:18px; }
    .folder-toggle { cursor:pointer; width:18px; text-align:center; }
    #sidebar .action-btn {
      background:rgba(255,255,255,0.06);
      border:none;
      border-radius:4px;
      padding:4px 10px;
      color:#bcc8dc;
      font-family:inherit;
      font-size:12px;
      cursor:pointer;
      width:100%;
      margin-top:6px;
      transition:background 0.15s;
      display:flex;
      align-items:center;
      gap:6px;
      justify-content:center;
    }
    #sidebar .action-btn:hover { background:rgba(255,255,255,0.12); }

    /* Center panel */
    #center {
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
      background:#0b0e14;
    }

    /* Tabs */
    #tabs-bar {
      flex-shrink:0;
      height:30px;
      background:rgba(11,14,20,0.8);
      border-bottom:1px solid rgba(255,255,255,0.06);
      display:flex;
      align-items:center;
      padding:0 8px;
      gap:2px;
      overflow-x:auto;
    }
    #tabs-bar .tab {
      padding:2px 12px;
      border-radius:4px 4px 0 0;
      font-size:12px;
      color:#8899b0;
      cursor:pointer;
      background:transparent;
      border-bottom:2px solid transparent;
      transition:all 0.15s;
      white-space:nowrap;
    }
    #tabs-bar .tab:hover { background:rgba(255,255,255,0.04); }
    #tabs-bar .tab.active { color:#e0e8f0; border-bottom-color:#7ae0b0; background:rgba(255,255,255,0.02); }

    /* Editor wrapper */
    #editor-wrapper {
      flex:1;
      position:relative;
      overflow:hidden;
    }
    #editor-wrapper .CodeMirror {
      height:100% !important;
      font-size:14px;
      font-family:'JetBrains Mono', monospace;
      background:#0b0e14;
    }
    .CodeMirror-gutters { background:#0b0e14 !important; border-right:1px solid rgba(255,255,255,0.06) !important; }
    .CodeMirror-linenumber { color:#8899b0 !important; }

    /* Output / Terminal / Preview containers */
    .panel-container {
      flex:1;
      display:none;
      overflow:hidden;
      background:#0b0e14;
    }
    .panel-container.active {
      display:flex;
      flex-direction:column;
    }
    #output-text {
      flex:1;
      padding:8px 12px;
      overflow-y:auto;
      font-family:'JetBrains Mono', monospace;
      font-size:13px;
      white-space:pre-wrap;
      word-wrap:break-word;
      line-height:1.6;
      color:#c8d0dc;
    }
    #output-text .error { color:#f28b82; }
    #output-text .success { color:#7ae0b0; }
    #output-text .info { color:#7aa2f7; }
    #output-text .warn { color:#f7dc6f; }

    #terminal-container {
      flex:1;
      padding:4px 8px;
      background:transparent;
      overflow:hidden;
    }
    #terminal-container .xterm { height:100%; }
    #terminal-container .xterm-viewport { background:transparent !important; }
    #terminal-container .xterm-screen { background:transparent !important; }
    #terminal-container .xterm-cursor { background-color:#7aa2f7 !important; box-shadow:0 0 12px rgba(122,162,247,0.5); }

    #preview-iframe {
      flex:1;
      width:100%;
      border:none;
      background:#fff;
    }

    /* Chat panel (right sidebar) */
    #chat-panel {
      width:340px;
      min-width:260px;
      background:rgba(20,26,36,0.85);
      backdrop-filter:blur(8px);
      border-left:1px solid rgba(255,255,255,0.06);
      display:flex;
      flex-direction:column;
    }
    #chat-panel .header {
      flex-shrink:0;
      height:36px;
      background:rgba(11,14,20,0.8);
      border-bottom:1px solid rgba(255,255,255,0.06);
      display:flex;
      align-items:center;
      padding:0 12px;
      font-weight:600;
      font-size:13px;
      gap:8px;
    }
    #chat-panel .header i { color:#7ae0b0; }
    #chat-messages {
      flex:1;
      overflow-y:auto;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .msg {
      padding:8px 12px;
      border-radius:10px;
      max-width:90%;
      font-size:13px;
      line-height:1.5;
      word-wrap:break-word;
    }
    .msg.user { align-self:flex-end; background:rgba(122,162,247,0.15); color:#e0e8f0; border-bottom-right-radius:4px; }
    .msg.assistant { align-self:flex-start; background:rgba(255,255,255,0.05); color:#e0e8f0; border-bottom-left-radius:4px; border:1px solid rgba(255,255,255,0.06); }
    .msg .role { font-size:10px; opacity:0.5; display:block; margin-bottom:2px; }

    #chat-input-area {
      flex-shrink:0;
      padding:8px 12px;
      border-top:1px solid rgba(255,255,255,0.06);
      display:flex;
      gap:6px;
      background:rgba(0,0,0,0.2);
    }
    #chat-input {
      flex:1;
      background:rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:6px;
      padding:6px 10px;
      color:#e0e8f0;
      font-family:inherit;
      font-size:13px;
      outline:none;
      resize:none;
      min-height:32px;
      max-height:100px;
    }
    #chat-input:focus { border-color:#7ae0b0; }
    #chat-send {
      background:#7ae0b0;
      border:none;
      border-radius:6px;
      padding:0 16px;
      color:#0b0e14;
      font-weight:600;
      cursor:pointer;
    }
    #chat-send:hover { background:#5fcfa0; }

    /* Status bar */
    #statusbar {
      flex-shrink:0;
      height:24px;
      background:rgba(11,14,20,0.9);
      border-top:1px solid rgba(255,255,255,0.06);
      display:flex;
      align-items:center;
      padding:0 16px;
      font-size:11px;
      color:#8899b0;
      gap:16px;
    }
    #statusbar .spacer { flex:1; }
    #statusbar .highlight { color:#e0e8f0; font-weight:500; }

    /* Responsive */
    @media (max-width:1024px) {
      #sidebar { width:170px; min-width:120px; }
      #chat-panel { width:280px; min-width:200px; }
    }
    @media (max-width:768px) {
      #sidebar { display:none; }
      #chat-panel { width:100%; min-width:0; border-left:none; border-top:1px solid rgba(255,255,255,0.06); max-height:40%; }
      #main { flex-direction:column; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:10px; }
    ::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.2); }
  </style>
</head>
<body>
<div id="app">
  <!-- Top Bar -->
  <div id="topbar">
    <div class="brand"><i class="fas fa-cube"></i>Sandbox</div>
    <div class="spacer"></div>
    <div class="status">
      <span><span class="dot" id="statusDot"></span> <span id="statusText">Ready</span></span>
      <span><i class="fas fa-robot"></i> AI online</span>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="title"><i class="fas fa-folder-open"></i> Explorer</div>
      <div id="fileTree"></div>
      <button class="action-btn" id="newFileBtn"><i class="fas fa-plus"></i> New File</button>
      <button class="action-btn" id="newFolderBtn" style="margin-top:4px;"><i class="fas fa-folder-plus"></i> New Folder</button>
    </div>

    <!-- Center -->
    <div id="center">
      <!-- Main tabs -->
      <div id="tabs-bar">
        <span class="tab active" data-tab="editor">Editor</span>
        <span class="tab" data-tab="output">Output</span>
        <span class="tab" data-tab="terminal">Terminal</span>
        <span class="tab" data-tab="preview">Preview</span>
        <span class="tab" data-tab="chat">Chat</span>
        <span style="flex:1;"></span>
        <span style="font-size:11px; color:#8899b0; margin-right:8px;" id="fileInfo">main.py</span>
      </div>

      <!-- Panels -->
      <div id="editor-wrapper" class="panel-container active">
        <textarea id="editorTextarea"></textarea>
      </div>
      <div id="output-container" class="panel-container">
        <div id="output-text"></div>
      </div>
      <div id="terminal-container" class="panel-container"></div>
      <div id="preview-container" class="panel-container">
        <iframe id="preview-iframe"></iframe>
      </div>
      <div id="chat-container" class="panel-container">
        <div style="flex:1; padding:12px; overflow-y:auto; display:flex; flex-direction:column; gap:8px;" id="chatMessages"></div>
        <div style="flex-shrink:0; padding:8px 12px; border-top:1px solid rgba(255,255,255,0.06); display:flex; gap:6px; background:rgba(0,0,0,0.2);">
          <textarea id="chatInput" rows="1" placeholder="Ask something..." style="flex:1; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.06); border-radius:6px; padding:6px 10px; color:#e0e8f0; font-family:inherit; font-size:13px; outline:none; resize:none; min-height:32px; max-height:100px;"></textarea>
          <button id="chatSend" style="background:#7ae0b0; border:none; border-radius:6px; padding:0 16px; color:#0b0e14; font-weight:600; cursor:pointer;">Send</button>
        </div>
      </div>
    </div>

    <!-- Chat panel (right sidebar) - we've integrated chat into main tabs, so we can remove this, but keep for toggle? Actually we'll use tab, so we don't need separate panel. Remove. -->
  </div>

  <!-- Status Bar -->
  <div id="statusbar">
    <span><i class="fas fa-code"></i> <span class="highlight">Python</span></span>
    <span><i class="fas fa-file"></i> <span id="statusFile">main.py</span></span>
    <span class="spacer"></span>
    <span><i class="fas fa-robot"></i> DeepSeek v4-pro</span>
    <span id="statusCursor">Ln 1, Col 1</span>
  </div>
</div>

<script>
  (function() {
    'use strict';

    // ─── CONFIG ──────────────────────────────────────────────────────────
    const PROXY_URL = 'https://battleground-deepseektoken.up.railway.app/api/chat';

    // ─── DOM REFS ──────────────────────────────────────────────────────
    const fileTreeEl = document.getElementById('fileTree');
    const editorTextarea = document.getElementById('editorTextarea');
    const outputText = document.getElementById('output-text');
    const terminalContainer = document.getElementById('terminal-container');
    const previewIframe = document.getElementById('preview-iframe');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const statusFile = document.getElementById('statusFile');
    const statusCursor = document.getElementById('statusCursor');
    const fileInfo = document.getElementById('fileInfo');

    // ─── STATE ────────────────────────────────────────────────────────
    let editor = null;
    let openTabs = [];
    let activeTabIndex = 0;
    let filesystem = {};
    let folderStructure = { '/': { type: 'folder', children: {} } };
    let pyodide = null;
    let isRunning = false;
    let conversation = [];
    let isChatProcessing = false;

    // Terminal
    let terminal = null;
    let fitAddon = null;
    let terminalReady = false;
    let currentTerminalDir = '/';
    let terminalHistory = [];
    let terminalHistoryIndex = 0;
    let terminalInputBuffer = '';

    // ─── PERSISTENCE ──────────────────────────────────────────────────
    function loadState() {
      try {
        const fs = localStorage.getItem('sandbox_fs');
        if (fs) {
          const parsed = JSON.parse(fs);
          filesystem = parsed.files || {};
          folderStructure = parsed.folders || { '/': { type: 'folder', children: {} } };
        } else {
          filesystem['/main.py'] = 'print("Hello, World!")';
          filesystem['/index.html'] = '<h1>Hello</h1>';
          folderStructure['/'] = { type: 'folder', children: { 'main.py': true, 'index.html': true } };
        }
        const conv = localStorage.getItem('sandbox_chat');
        if (conv) conversation = JSON.parse(conv);
        const tabs = localStorage.getItem('sandbox_tabs');
        if (tabs) {
          const parsedTabs = JSON.parse(tabs);
          openTabs = parsedTabs.tabs || [];
          activeTabIndex = parsedTabs.active || 0;
        } else {
          const keys = Object.keys(filesystem);
          if (keys.length > 0) { openTabs = [keys[0]]; activeTabIndex = 0; }
        }
      } catch (_) {}
    }
    function saveState() {
      localStorage.setItem('sandbox_fs', JSON.stringify({ files: filesystem, folders: folderStructure }));
      localStorage.setItem('sandbox_chat', JSON.stringify(conversation));
      localStorage.setItem('sandbox_tabs', JSON.stringify({ tabs: openTabs, active: activeTabIndex }));
    }

    // ─── FILE TREE RENDER ────────────────────────────────────────────
    function renderTree() {
      function renderNode(path, node) {
        const div = document.createElement('div');
        if (node.type === 'folder') {
          const header = document.createElement('div');
          header.className = 'tree-item';
          header.innerHTML = `
            <span class="folder-toggle"><i class="fas fa-chevron-down"></i></span>
            <span class="icon"><i class="fas fa-folder"></i></span>
            <span class="name">${path === '/' ? 'root' : path.split('/').pop()}</span>
          `;
          const childrenDiv = document.createElement('div');
          childrenDiv.className = 'tree-children';
          const keys = Object.keys(node.children || {}).sort();
          for (const child of keys) {
            const childPath = path + (path.endsWith('/') ? '' : '/') + child;
            const childNode = folderStructure[childPath];
            if (childNode) {
              childrenDiv.appendChild(renderNode(childPath, childNode));
            }
          }
          header.addEventListener('click', () => {
            const children = header.parentElement.querySelector('.tree-children');
            const icon = header.querySelector('.folder-toggle i');
            if (children.style.display === 'none') {
              children.style.display = '';
              icon.className = 'fas fa-chevron-down';
            } else {
              children.style.display = 'none';
              icon.className = 'fas fa-chevron-right';
            }
          });
          div.appendChild(header);
          div.appendChild(childrenDiv);
        } else {
          const item = document.createElement('div');
          item.className = 'tree-item file';
          if (openTabs.includes(path) && path === openTabs[activeTabIndex]) item.classList.add('active');
          const ext = path.split('.').pop();
          let icon = 'fa-regular fa-file';
          if (ext === 'py') icon = 'fa-brands fa-python';
          else if (ext === 'js') icon = 'fa-brands fa-js';
          else if (ext === 'html') icon = 'fa-brands fa-html5';
          else if (ext === 'css') icon = 'fa-brands fa-css3-alt';
          else if (ext === 'json') icon = 'fa-regular fa-file-code';
          item.innerHTML = `
            <span class="icon"><i class="${icon}"></i></span>
            <span class="name">${path.split('/').pop()}</span>
            <button class="del" data-path="${path}"><i class="fas fa-times"></i></button>
          `;
          item.addEventListener('click', (e) => {
            if (e.target.closest('.del')) return;
            openFile(path);
          });
          const del = item.querySelector('.del');
          if (del) {
            del.addEventListener('click', (e) => {
              e.stopPropagation();
              deleteFile(path);
            });
          }
          div.appendChild(item);
        }
        return div;
      }

      fileTreeEl.innerHTML = '';
      const root = folderStructure['/'];
      if (root) {
        fileTreeEl.appendChild(renderNode('/', root));
      }
    }

    // ─── FILE OPERATIONS ─────────────────────────────────────────────
    function openFile(path, createIfMissing = true) {
      if (createIfMissing && !filesystem[path]) {
        const parts = path.split('/').filter(p => p);
        let current = '/';
        for (let i = 0; i < parts.length; i++) {
          const part = parts[i];
          const parent = current;
          const childPath = parent + (parent.endsWith('/') ? '' : '/') + part;
          if (i === parts.length - 1) {
            if (!folderStructure[parent]) folderStructure[parent] = { type: 'folder', children: {} };
            folderStructure[parent].children[part] = true;
            filesystem[childPath] = '';
          } else {
            if (!folderStructure[childPath]) {
              folderStructure[childPath] = { type: 'folder', children: {} };
              folderStructure[parent].children[part] = true;
            }
          }
          current = childPath;
        }
        saveState();
      }

      if (!openTabs.includes(path)) {
        openTabs.push(path);
      }
      activeTabIndex = openTabs.indexOf(path);
      renderTabs();
      renderTree();
      const content = filesystem[path] || '';
      editor.setValue(content);
      const ext = path.split('.').pop();
      let mode = 'python';
      if (ext === 'js') mode = 'javascript';
      else if (ext === 'html') mode = 'htmlmixed';
      else if (ext === 'css') mode = 'css';
      else if (ext === 'json') mode = 'javascript';
      editor.setOption('mode', mode);
      statusFile.textContent = path;
      fileInfo.textContent = path;
      currentTerminalDir = path.substring(0, path.lastIndexOf('/')) || '/';
      saveState();
      updateCursorStatus();
    }

    function saveCurrentFile() {
      if (openTabs.length === 0) return;
      const path = openTabs[activeTabIndex];
      if (!path) return;
      filesystem[path] = editor.getValue();
      saveState();
    }

    function deleteFile(path) {
      if (!confirm(`Delete "${path}"?`)) return;
      delete filesystem[path];
      const parts = path.split('/').filter(p => p);
      const parentPath = parts.slice(0, -1).join('/') || '/';
      const name = parts[parts.length-1];
      if (folderStructure[parentPath] && folderStructure[parentPath].children) {
        delete folderStructure[parentPath].children[name];
      }
      const idx = openTabs.indexOf(path);
      if (idx !== -1) {
        openTabs.splice(idx, 1);
        if (activeTabIndex >= openTabs.length) activeTabIndex = openTabs.length - 1;
        if (activeTabIndex < 0) activeTabIndex = 0;
      }
      if (openTabs.length === 0) {
        createFile('/main.py', 'print("Hello, World!")');
      } else {
        openFile(openTabs[activeTabIndex], false);
      }
      saveState();
      renderTree();
      renderTabs();
    }

    function createFile(path, content = '') {
      if (filesystem[path] !== undefined) return;
      const parts = path.split('/').filter(p => p);
      let current = '/';
      for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        const parent = current;
        const childPath = parent + (parent.endsWith('/') ? '' : '/') + part;
        if (i === parts.length - 1) {
          if (!folderStructure[parent]) folderStructure[parent] = { type: 'folder', children: {} };
          folderStructure[parent].children[part] = true;
          filesystem[childPath] = content;
        } else {
          if (!folderStructure[childPath]) {
            folderStructure[childPath] = { type: 'folder', children: {} };
            folderStructure[parent].children[part] = true;
          }
        }
        current = childPath;
      }
      saveState();
      renderTree();
      openFile(path);
    }

    function createFolder(path) {
      if (folderStructure[path]) return;
      const parts = path.split('/').filter(p => p);
      let current = '/';
      for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        const parent = current;
        const childPath = parent + (parent.endsWith('/') ? '' : '/') + part;
        if (i === parts.length - 1) {
          if (!folderStructure[parent]) folderStructure[parent] = { type: 'folder', children: {} };
          folderStructure[parent].children[part] = true;
          folderStructure[childPath] = { type: 'folder', children: {} };
        } else {
          if (!folderStructure[childPath]) {
            folderStructure[childPath] = { type: 'folder', children: {} };
            folderStructure[parent].children[part] = true;
          }
        }
        current = childPath;
      }
      saveState();
      renderTree();
    }

    // ─── TABS RENDER ──────────────────────────────────────────────────
    function renderTabs() {
      const bar = document.getElementById('tabs-bar');
      // Keep the tabs for panels, but we also have file tabs? We'll use the main tabs for panels, not for files. We'll just show file name in status.
      // Actually we don't need file tabs, we have a single editor. So we just show current file.
      // We'll not add extra tabs to avoid clutter.
      // The main tabs are for switching views (Editor, Output, Terminal, Preview, Chat).
      // So we don't need dynamic file tabs.
      // Instead, we show the current filename in status bar.
      // We'll keep this function just to update the active state on tree.
    }

    // ─── EDITOR INIT ──────────────────────────────────────────────────
    function initEditor() {
      editor = CodeMirror.fromTextArea(editorTextarea, {
        mode: 'python',
        theme: 'dracula',
        lineNumbers: true,
        matchBrackets: true,
        styleActiveLine: true,
        foldGutter: true,
        gutters: ['CodeMirror-foldgutter', 'CodeMirror-linenumbers'],
        indentUnit: 4,
        tabSize: 4,
        indentWithTabs: false,
        extraKeys: {
          'Ctrl-S': saveCurrentFile,
          'Cmd-S': saveCurrentFile,
          'Ctrl-Enter': runCode,
          'Cmd-Enter': runCode,
          'Ctrl-/': 'toggleComment',
          'Cmd-/': 'toggleComment',
          'Ctrl-Space': 'autocomplete',
          'Shift-9': function(cm) { cm.replaceSelection('('); },
          'Shift-0': function(cm) { cm.replaceSelection(')'); },
        }
      });
      editor.on('cursorActivity', updateCursorStatus);
      editor.on('change', () => {
        if (openTabs.length > 0) {
          clearTimeout(window._autoSaveTimer);
          window._autoSaveTimer = setTimeout(saveCurrentFile, 800);
        }
      });
      // Load first file
      if (openTabs.length === 0) {
        const keys = Object.keys(filesystem);
        if (keys.length > 0) {
          openTabs = [keys[0]];
          activeTabIndex = 0;
        } else {
          createFile('/main.py', 'print("Hello, World!")');
        }
      }
      openFile(openTabs[activeTabIndex], false);
      renderTree();
    }

    function updateCursorStatus() {
      if (!editor) return;
      const pos = editor.getCursor();
      statusCursor.textContent = `Ln ${pos.line + 1}, Col ${pos.ch + 1}`;
    }

    // ─── PYODIDE INIT ──────────────────────────────────────────────────
    async function initPyodide() {
      statusText.textContent = 'Loading Pyodide...';
      statusDot.className = 'dot off';
      try {
        pyodide = await loadPyodide({
          indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.1/full/'
        });
        await pyodide.loadPackage(['micropip', 'numpy', 'pandas', 'matplotlib']);
        await pyodide.runPythonAsync(`
          import matplotlib
          matplotlib.use('module://matplotlib_pyodide.html5_canvas_backend')
          import matplotlib.pyplot as plt
        `);
        statusText.textContent = 'Ready';
        statusDot.className = 'dot';
        appendOutput('Pyodide loaded.\n', 'success');
      } catch (err) {
        statusText.textContent = 'Error';
        statusDot.className = 'dot off';
        appendOutput('Failed to load Pyodide: ' + err.message + '\n', 'error');
      }
    }

    // ─── OUTPUT / TERMINAL ──────────────────────────────────────────
    function appendOutput(text, className = '') {
      const lines = text.split('\n');
      for (const line of lines) {
        if (line.trim() === '') continue;
        const div = document.createElement('div');
        div.className = className || '';
        div.textContent = line;
        outputText.appendChild(div);
      }
      outputText.scrollTop = outputText.scrollHeight;
    }

    function clearOutput() {
      outputText.innerHTML = '';
    }

    // Terminal
    function initTerminal() {
      terminal = new Terminal({
        cursorBlink: true,
        fontSize: 13,
        fontFamily: '"JetBrains Mono", monospace',
        theme: {
          background: '#0b0e14',
          foreground: '#c8d0dc',
          cursor: '#7aa2f7',
          cursorAccent: '#0b0e14',
          selection: 'rgba(122,162,247,0.25)',
          black: '#181e28',
          red: '#f28b82',
          green: '#7ae0b0',
          yellow: '#f7dc6f',
          blue: '#7aa2f7',
          magenta: '#bb6bd9',
          cyan: '#5bc0de',
          white: '#e8edf5',
          brightBlack: '#6a7a90',
          brightRed: '#ff6b6b',
          brightGreen: '#8ce0a0',
          brightYellow: '#f7dc6f',
          brightBlue: '#7aa2f7',
          brightMagenta: '#d4a0e8',
          brightCyan: '#8ad8e8',
          brightWhite: '#f0f4fc'
        },
        convertEol: true,
        scrollback: 2000,
        tabStopWidth: 4,
      });
      fitAddon = new FitAddon.FitAddon();
      const webLinksAddon = new WebLinksAddon.WebLinksAddon();
      terminal.loadAddon(fitAddon);
      terminal.loadAddon(webLinksAddon);
      terminal.open(terminalContainer);
      fitAddon.fit();

      terminal.onKey((e) => {
        const ev = e.domEvent;
        const key = e.key;
        if (ev.key === 'Enter') {
          const line = terminalInputBuffer.trim();
          terminalInputBuffer = '';
          terminal.writeln('');
          if (line) {
            terminalHistory.push(line);
            terminalHistoryIndex = terminalHistory.length;
            handleTerminalCommand(line);
          } else {
            writeTerminalPrompt();
          }
          ev.preventDefault();
        } else if (ev.key === 'Backspace') {
          if (terminalInputBuffer.length > 0) {
            terminalInputBuffer = terminalInputBuffer.slice(0, -1);
            terminal.write('\x1b[1D\x1b[K');
          }
          ev.preventDefault();
        } else if (ev.key === 'ArrowUp') {
          if (terminalHistoryIndex > 0) {
            terminalHistoryIndex--;
            const hist = terminalHistory[terminalHistoryIndex] || '';
            terminal.write('\r\x1b[K');
            writeTerminalPrompt();
            terminal.write(hist);
            terminalInputBuffer = hist;
          }
          ev.preventDefault();
        } else if (ev.key === 'ArrowDown') {
          if (terminalHistoryIndex < terminalHistory.length - 1) {
            terminalHistoryIndex++;
            const hist = terminalHistory[terminalHistoryIndex] || '';
            terminal.write('\r\x1b[K');
            writeTerminalPrompt();
            terminal.write(hist);
            terminalInputBuffer = hist;
          } else {
            terminalHistoryIndex = terminalHistory.length;
            terminal.write('\r\x1b[K');
            writeTerminalPrompt();
            terminalInputBuffer = '';
          }
          ev.preventDefault();
        } else if (key.length === 1 && key.charCodeAt(0) >= 32) {
          terminalInputBuffer += key;
          terminal.write(key);
        }
      });

      terminalReady = true;
      writeTerminalPrompt();
    }

    function writeTerminalPrompt() {
      terminal.write(`\r\n\x1b[36m${currentTerminalDir} $ \x1b[0m`);
    }

    function handleTerminalCommand(cmd) {
      const parts = cmd.split(/\s+/);
      const command = parts[0];
      const args = parts.slice(1);

      if (command === 'ls') {
        const path = currentTerminalDir;
        const node = folderStructure[path];
        if (node && node.type === 'folder') {
          const children = Object.keys(node.children || {});
          if (children.length === 0) {
            terminal.writeln('(empty)');
          } else {
            children.forEach(child => {
              const childPath = path + (path.endsWith('/') ? '' : '/') + child;
              const isFolder = folderStructure[childPath]?.type === 'folder';
              terminal.writeln(`${isFolder ? '\x1b[36m' : ''}${child}${isFolder ? '/' : ''}\x1b[0m`);
            });
          }
        } else {
          terminal.writeln('\x1b[31mNot a directory\x1b[0m');
        }
        writeTerminalPrompt();
        return;
      }

      if (command === 'cd') {
        if (args.length === 0) {
          currentTerminalDir = '/';
          writeTerminalPrompt();
          return;
        }
        const target = args[0];
        let newPath;
        if (target.startsWith('/')) {
          newPath = target;
        } else {
          newPath = currentTerminalDir + (currentTerminalDir.endsWith('/') ? '' : '/') + target;
        }
        newPath = newPath.replace(/\/+/g, '/');
        if (folderStructure[newPath] && folderStructure[newPath].type === 'folder') {
          currentTerminalDir = newPath;
        } else {
          terminal.writeln(`\x1b[31mcd: ${target}: No such directory\x1b[0m`);
        }
        writeTerminalPrompt();
        return;
      }

      if (command === 'cat') {
        if (args.length === 0) {
          terminal.writeln('\x1b[31mUsage: cat <file>\x1b[0m');
          writeTerminalPrompt();
          return;
        }
        const filePath = currentTerminalDir + (currentTerminalDir.endsWith('/') ? '' : '/') + args[0];
        if (filesystem[filePath] !== undefined) {
          terminal.writeln(filesystem[filePath]);
        } else {
          terminal.writeln(`\x1b[31mcat: ${args[0]}: No such file\x1b[0m`);
        }
        writeTerminalPrompt();
        return;
      }

      if (command === 'run' || command === 'python' || command === 'node') {
        if (args.length === 0) {
          terminal.writeln(`\x1b[31mUsage: ${command} <file>\x1b[0m`);
          writeTerminalPrompt();
          return;
        }
        const filePath = currentTerminalDir + (currentTerminalDir.endsWith('/') ? '' : '/') + args[0];
        if (filesystem[filePath] === undefined) {
          terminal.writeln(`\x1b[31m${command}: ${args[0]}: No such file\x1b[0m`);
          writeTerminalPrompt();
          return;
        }
        const ext = filePath.split('.').pop();
        if (command === 'python' || (command === 'run' && ext === 'py')) {
          runPython(filePath);
        } else if (command === 'node' || (command === 'run' && ext === 'js')) {
          runJavaScript(filePath);
        } else if (command === 'run' && ext === 'html') {
          runHTML(filePath);
        } else {
          terminal.writeln(`\x1b[31mDon't know how to run ${ext} files\x1b[0m`);
          writeTerminalPrompt();
        }
        return;
      }

      if (command === 'clear') {
        terminal.clear();
        writeTerminalPrompt();
        return;
      }

      if (command === 'help') {
        terminal.writeln('\x1b[36mCommands:\x1b[0m');
        terminal.writeln('  ls, cd, cat, run <file>, python <file>, node <file>, clear, help');
        writeTerminalPrompt();
        return;
      }

      terminal.writeln(`\x1b[31mCommand not found: ${command}\x1b[0m`);
      writeTerminalPrompt();
    }

    // ─── CODE EXECUTION ──────────────────────────────────────────────
    function runPython(filePath) {
      const code = filesystem[filePath] || '';
      if (!code.trim()) {
        appendOutput('No code to run.\n', 'info');
        return;
      }
      if (!pyodide) {
        appendOutput('Pyodide not ready.\n', 'error');
        return;
      }
      isRunning = true;
      appendOutput(`\n--- Running ${filePath} ---\n`, 'info');

      const captureCode = `
import sys
from io import StringIO
__stdout = StringIO()
__stderr = StringIO()
sys.stdout = __stdout
sys.stderr = __stderr
try:
    exec(${JSON.stringify(code)})
except Exception as e:
    print(e, file=sys.stderr)
finally:
    sys.stdout = sys.__stdout__
    sys.stderr = sys.__stderr__
    __output = __stdout.getvalue()
    __error = __stderr.getvalue()
    __output + __error
`;

      pyodide.runPythonAsync(captureCode).then(result => {
        if (result && result.trim()) {
          appendOutput(result, '');
        } else {
          appendOutput('(no output)\n', 'info');
        }
        appendOutput(`--- End ---\n`, 'info');
        isRunning = false;
      }).catch(err => {
        const errMsg = err.message || String(err);
        if (errMsg.includes('ModuleNotFoundError') || errMsg.includes('No module named')) {
          const match = errMsg.match(/No module named ['"]([^'"]+)['"]/);
          if (match) {
            const moduleName = match[1];
            appendOutput(`[WARNING] Library '${moduleName}' not installed.\n`, 'warn');
            appendOutput(`To install: import micropip; await micropip.install('${moduleName}')\n`, 'info');
          } else {
            appendOutput(`Error: ${errMsg}\n`, 'error');
          }
        } else {
          appendOutput(`Error: ${errMsg}\n`, 'error');
        }
        isRunning = false;
      });
    }

    function runJavaScript(filePath) {
      const code = filesystem[filePath] || '';
      if (!code.trim()) {
        appendOutput('No code to run.\n', 'info');
        return;
      }
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
      const win = iframe.contentWindow;
      const oldLog = win.console.log;
      const oldError = win.console.error;
      let output = '';
      win.console.log = function(...args) {
        output += args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ') + '\n';
      };
      win.console.error = function(...args) {
        output += 'Error: ' + args.map(a => String(a)).join(' ') + '\n';
      };
      try {
        const result = win.eval(code);
        if (result !== undefined) {
          output += '→ ' + (typeof result === 'object' ? JSON.stringify(result, null, 2) : String(result)) + '\n';
        }
      } catch (e) {
        output += 'Error: ' + e.message + '\n';
      }
      win.console.log = oldLog;
      win.console.error = oldError;
      document.body.removeChild(iframe);
      appendOutput(`\n--- Running ${filePath} ---\n`, 'info');
      appendOutput(output.trim() || '(no output)\n', '');
      appendOutput(`--- End ---\n`, 'info');
    }

    function runHTML(filePath) {
      const html = filesystem[filePath] || '';
      if (!html.trim()) {
        appendOutput('No content to preview.\n', 'info');
        return;
      }
      showTab('preview');
      previewIframe.src = 'data:text/html;charset=utf-8,' + encodeURIComponent(html);
      appendOutput(`\n--- Previewing ${filePath} ---\n`, 'info');
    }

    function runCode() {
      if (openTabs.length === 0) return;
      const path = openTabs[activeTabIndex];
      if (!path) return;
      const ext = path.split('.').pop();
      if (ext === 'py') runPython(path);
      else if (ext === 'js') runJavaScript(path);
      else if (ext === 'html') runHTML(path);
      else appendOutput(`\x1b[31mDon't know how to run .${ext} files\x1b[0m\n`, 'error');
    }

    // ─── TAB SWITCHING ──────────────────────────────────────────────
    function showTab(tabName) {
      document.querySelectorAll('.panel-container').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('#tabs-bar .tab').forEach(el => el.classList.remove('active'));

      const panelMap = {
        'editor': 'editor-wrapper',
        'output': 'output-container',
        'terminal': 'terminal-container',
        'preview': 'preview-container',
        'chat': 'chat-container'
      };
      const panel = document.getElementById(panelMap[tabName]);
      if (panel) panel.classList.add('active');

      const tab = document.querySelector(`#tabs-bar .tab[data-tab="${tabName}"]`);
      if (tab) tab.classList.add('active');

      if (tabName === 'terminal' && terminalReady) {
        setTimeout(() => fitAddon.fit(), 50);
      }
    }

    // ─── CHAT ──────────────────────────────────────────────────────────
    async function sendChatMessage(userMessage) {
      if (isChatProcessing) return;
      if (!userMessage.trim()) return;

      addChatMessage('user', userMessage);
      chatInput.value = '';
      chatInput.style.height = 'auto';

      conversation.push({ role: 'user', content: userMessage });
      saveState();

      isChatProcessing = true;
      chatSend.disabled = true;

      const systemPrompt = 'You are an expert developer and coding assistant. Help users write, debug, and understand code. Provide clear explanations and code examples.';
      const messages = [ { role: 'system', content: systemPrompt }, ...conversation ];

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 30000);
        const response = await fetch(PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages,
            model: 'deepseek-v4-pro',
            stream: false,  // non-streaming for simplicity
            temperature: 0.7,
            reasoning_effort: 'medium'
          }),
          signal: controller.signal
        });
        clearTimeout(timeout);

        if (!response.ok) {
          let errMsg = `HTTP ${response.status}`;
          try { const data = await response.json(); if (data.error) errMsg = data.error; } catch (_) {}
          throw new Error(errMsg);
        }

        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || 'No response content.';
        addChatMessage('assistant', reply);
        conversation.push({ role: 'assistant', content: reply });
        saveState();

      } catch (err) {
        if (err.name === 'AbortError') {
          addChatMessage('assistant', 'Request timed out. Please try again.');
        } else {
          addChatMessage('assistant', `Error: ${err.message}`);
        }
      } finally {
        isChatProcessing = false;
        chatSend.disabled = false;
        chatInput.focus();
      }
    }

    function addChatMessage(role, content) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const label = document.createElement('span');
      label.className = 'role';
      label.textContent = role === 'user' ? 'You' : 'Assistant';
      div.appendChild(label);
      const text = document.createElement('span');
      text.textContent = content;
      div.appendChild(text);
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function explainCode() {
      if (openTabs.length === 0) return;
      const path = openTabs[activeTabIndex];
      if (!path) return;
      const code = editor.getValue();
      if (!code.trim()) {
        appendOutput('No code to explain.\n', 'info');
        return;
      }
      const prompt = `Explain this code (${path}) in detail:\n\n${code}`;
      await sendChatMessage(prompt);
    }

    // ─── INIT ──────────────────────────────────────────────────────────
    function init() {
      loadState();
      initEditor();

      // Tab switching
      document.querySelectorAll('#tabs-bar .tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const tabName = tab.dataset.tab;
          showTab(tabName);
        });
      });

      // Buttons
      document.getElementById('newFileBtn').addEventListener('click', () => {
        const name = prompt('File path (e.g., /src/app.js):');
        if (name && name.trim()) {
          const path = name.trim().startsWith('/') ? name.trim() : '/' + name.trim();
          if (filesystem[path]) {
            alert('File exists.');
          } else {
            createFile(path, '');
          }
        }
      });
      document.getElementById('newFolderBtn').addEventListener('click', () => {
        const name = prompt('Folder path (e.g., /src):');
        if (name && name.trim()) {
          const path = name.trim().startsWith('/') ? name.trim() : '/' + name.trim();
          if (folderStructure[path]) {
            alert('Folder exists.');
          } else {
            createFolder(path);
          }
        }
      });

      // Run/Explain from toolbar (we'll add buttons in top bar)
      const toolbar = document.querySelector('#tabs-bar');
      const runBtn = document.createElement('span');
      runBtn.textContent = '▶ Run';
      runBtn.style.cssText = 'background:rgba(122,162,247,0.2); color:#7aa2f7; padding:2px 12px; border-radius:12px; cursor:pointer; font-size:12px; margin-left:8px;';
      runBtn.addEventListener('click', runCode);
      toolbar.appendChild(runBtn);

      const explainBtn = document.createElement('span');
      explainBtn.textContent = '💬 Explain';
      explainBtn.style.cssText = 'background:rgba(122,224,176,0.15); color:#7ae0b0; padding:2px 12px; border-radius:12px; cursor:pointer; font-size:12px; margin-left:4px;';
      explainBtn.addEventListener('click', explainCode);
      toolbar.appendChild(explainBtn);

      // Chat send
      chatSend.addEventListener('click', () => sendChatMessage(chatInput.value));
      chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          chatSend.click();
        }
      });
      chatInput.addEventListener('input', () => {
        chatInput.style.height = 'auto';
        chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
      });

      // Load previous chat
      conversation.forEach(msg => {
        addChatMessage(msg.role, msg.content);
      });

      // Init Pyodide and Terminal
      initPyodide();
      initTerminal();

      // Default tab: editor
      showTab('editor');

      window.addEventListener('resize', () => {
        if (editor) editor.refresh();
        if (terminalReady) fitAddon.fit();
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  })();
</script>
