  <style>
    /* ----- (Full CSS – same as before, but now complete) ----- */
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; background:#0b0e14; font-family:'Inter',sans-serif; color:#e0e8f0; overflow:hidden; }
    #app { display:flex; flex-direction:column; height:100vh; background:radial-gradient(ellipse at 20% 30%, rgba(20,60,140,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 70%, rgba(120,40,100,0.06) 0%, transparent 60%), #0b0e14; }
    #topbar { flex-shrink:0; height:48px; background:rgba(11,14,20,0.85); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; padding:0 20px; gap:16px; z-index:20; }

    #topbar .toggle-group { display:flex; gap:6px; }

    #topbar .toggle-btn:hover { background:rgba(255,255,255,0.08); color:#fff; }
    #topbar .toggle-btn.active { color:#7ae0b0; background:rgba(122,224,176,0.12); border-color:rgba(122,224,176,0.2); }

    #main { display:flex; flex:1; overflow:hidden; }
    #sidebar { width:240px; min-width:180px; background:rgba(20,26,36,0.85); backdrop-filter:blur(12px); border-right:1px solid rgba(255,255,255,0.06); padding:12px 8px; overflow-y:auto; flex-shrink:0; transition:width 0.25s ease, padding 0.25s ease; }
    #sidebar.hidden { width:0; min-width:0; padding:0; border:none; overflow:hidden; }

    .tree-item:hover { background:rgba(255,255,255,0.05); }

    .tree-item .icon { width:18px; font-size:14px; opacity:0.7; text-align:center; }
    .tree-item .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tree-item .del-btn { background:none; border:none; color:#8899b0; cursor:pointer; opacity:0; transition:opacity 0.15s; padding:0 4px; }
    .tree-item:hover .del-btn { opacity:1; }
    .tree-item .del-btn:hover { color:#f28b82; }

    .folder-toggle { cursor:pointer; width:18px; text-align:center; }
    #sidebar .action-btn { background:rgba(255,255,255,0.06); border:none; border-radius:6px; padding:6px 12px; color:#8899b0; font-family:inherit; font-size:12px; cursor:pointer; width:100%; margin-top:8px; transition:background 0.15s; display:flex; align-items:center; gap:8px; justify-content:center; }
    #sidebar .action-btn:hover { background:rgba(255,255,255,0.08); color:#fff; }

    #center { flex:1; display:flex; flex-direction:column; min-width:0; background:#0b0e14; }
    #tabs-bar { flex-shrink:0; height:32px; background:rgba(11,14,20,0.8); backdrop-filter:blur(8px); border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; padding:0 8px; gap:2px; overflow-x:auto; }
    #tabs-bar .tab { padding:4px 14px; border-radius:4px 4px 0 0; font-size:12px; color:#8899b0; cursor:pointer; display:flex; align-items:center; gap:6px; background:transparent; border-bottom:2px solid transparent; transition:all 0.15s; white-space:nowrap; }
    #tabs-bar .tab:hover { background:rgba(255,255,255,0.04); }
    #tabs-bar .tab.active { color:#e0e8f0; border-bottom-color:#7ae0b0; background:rgba(255,255,255,0.02); }
    #tabs-bar .tab .close-tab { background:none; border:none; color:#8899b0; cursor:pointer; padding:0 2px; border-radius:4px; font-size:12px; }
    #tabs-bar .tab .close-tab:hover { background:rgba(255,255,255,0.1); color:#fff; }

    #editor-wrapper { flex:1; position:relative; overflow:hidden; background:#0b0e14; }
    #editor-wrapper .CodeMirror { height:100% !important; font-size:14px; font-family:'JetBrains Mono', monospace; background:#0b0e14; }
    .CodeMirror-gutters { background:#0b0e14 !important; border-right:1px solid rgba(255,255,255,0.06) !important; }

    #output-container { flex-shrink:0; height:220px; min-height:120px; max-height:450px; background:rgba(0,0,0,0.4); border-top:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column; transition:height 0.25s ease; overflow:hidden; }
    #output-container.hidden { height:0; min-height:0; max-height:0; border:none; }
    #output-header { flex-shrink:0; height:30px; background:rgba(11,14,20,0.8); padding:0 12px; display:flex; align-items:center; font-size:11px; color:#8899b0; gap:12px; border-bottom:1px solid rgba(255,255,255,0.06); }
    #output-header .tabs { display:flex; gap:6px; }
    #output-header .tabs span { padding:2px 12px; border-radius:12px; cursor:pointer; background:rgba(255,255,255,0.06); transition:all 0.15s; font-weight:500; }
    #output-header .tabs span:hover { background:rgba(255,255,255,0.08); }
    #output-header .tabs span.active { background:rgba(122,162,247,0.15); color:#7aa2f7; }
    #output-header .clear-btn { margin-left:auto; background:none; border:none; color:#8899b0; cursor:pointer; font-size:12px; }

    #output-text { flex:1; padding:8px 12px; overflow-y:auto; font-family:'JetBrains Mono', monospace; font-size:13px; white-space:pre-wrap; word-wrap:break-word; line-height:1.6; color:#e0e8f0; }
    #output-text .error { color:#f28b82; }
    #output-text .success { color:#7ae0b0; }
    #output-text .info { color:#7aa2f7; }
    #output-text .warn { color:#f7dc6f; }

    #terminal-container .xterm { height:100%; }
    #terminal-container .xterm-viewport { background:transparent !important; }
    #terminal-container .xterm-screen { background:transparent !important; }
    #terminal-container .xterm-cursor { background-color:#7aa2f7 !important; box-shadow:0 0 12px rgba(122,162,247,0.5); }
    #preview-iframe { flex:1; display:none; width:100%; border:none; background:#fff; }

    #chat-panel { width:380px; min-width:280px; max-width:440px; background:rgba(20,26,36,0.85); backdrop-filter:blur(12px); border-left:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column; transition:width 0.25s ease, padding 0.25s ease; overflow:hidden; }
    #chat-panel.hidden { width:0; min-width:0; max-width:0; border:none; padding:0; overflow:hidden; }

    #chat-header i { color:#7ae0b0; }
    #chat-header .status-badge { margin-left:auto; font-size:10px; background:rgba(122,224,176,0.15); padding:2px 12px; border-radius:12px; color:#7ae0b0; }
    #chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .msg { padding:10px 14px; border-radius:12px; max-width:92%; font-size:14px; line-height:1.6; word-wrap:break-word; animation:fadeIn 0.25s ease; position:relative; }
    .msg.user { align-self:flex-end; background:rgba(122,162,247,0.15); color:#e0e8f0; border-bottom-right-radius:4px; }
    .msg.assistant { align-self:flex-start; background:rgba(255,255,255,0.04); color:#e0e8f0; border-bottom-left-radius:4px; border:1px solid rgba(255,255,255,0.06); }

    .msg .markdown-body code { font-family:'JetBrains Mono', monospace; background:rgba(0,0,0,0.2); padding:2px 6px; border-radius:4px; }

    #chat-input { flex:1; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.06); border-radius:8px; padding:8px 12px; color:#e0e8f0; font-family:'Inter',sans-serif; font-size:13px; outline:none; transition:border 0.2s; resize:none; min-height:36px; max-height:120px; }

    @media (max-width:768px) { #sidebar { display:none; } #chat-panel { width:100%; min-width:0; border-left:none; border-top:1px solid rgba(255,255,255,0.06); max-height:45%; } #main { flex-direction:column; } #output-container { height:150px; } }

    /* Custom modal for confirm/prompt */
    .custom-modal-overlay {
      position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:9999; animation:fadeIn 0.2s ease;
    }
    .custom-modal {
      background:#1e2630; border-radius:16px; padding:24px 32px; max-width:420px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.06);
    }
    .custom-modal h3 { color:#e0e8f0; font-weight:600; font-size:18px; margin-bottom:8px; }
    .custom-modal p { color:#8899b0; font-size:14px; line-height:1.5; margin-bottom:16px; }
    .custom-modal input { width:100%; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:8px 12px; color:#e0e8f0; font-size:14px; margin-bottom:16px; outline:none; }
    .custom-modal input:focus { border-color:#7ae0b0; }
    .custom-modal .modal-actions { display:flex; gap:8px; justify-content:flex-end; }
    .custom-modal .modal-actions button { padding:6px 16px; border-radius:8px; border:none; font-weight:500; cursor:pointer; transition:background 0.2s; }
    .custom-modal .modal-actions .btn-primary { background:#7ae0b0; color:#0b0e14; }
    .custom-modal .modal-actions .btn-primary:hover { background:#5fcfa0; }
    .custom-modal .modal-actions .btn-secondary { background:rgba(255,255,255,0.06); color:#8899b0; }
    .custom-modal .modal-actions .btn-secondary:hover { background:rgba(255,255,255,0.12); }
  </style>
</head>
<body>
<div id="app">
  <!-- Top Bar -->
  <div id="topbar">
    <div class="brand"><i class="fas fa-cube"></i>Sandbox</div>
    <div class="spacer"></div>
    <div class="toggle-group">
      <button class="toggle-btn" id="toggle-sidebar" aria-label="Toggle sidebar"><i class="fas fa-folder"></i></button>
      <button class="toggle-btn" id="toggle-output" aria-label="Toggle output"><i class="fas fa-terminal"></i></button>
      <button class="toggle-btn" id="toggle-chat" aria-label="Toggle chat"><i class="fas fa-comment"></i></button>
      <button class="toggle-btn" id="toggle-maximize" aria-label="Maximize editor"><i class="fas fa-expand"></i></button>
    </div>
    <div class="status">
      <span><span class="dot" id="status-dot"></span> <span id="status-text">Pyodide</span></span>
      <span><i class="fas fa-robot"></i> <span id="ai-status">AI ready</span></span>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="section-title"><i class="fas fa-folder-open"></i> Explorer</div>
      <div id="file-tree" role="tree" aria-label="File explorer"></div>
      <button class="action-btn" id="new-file-btn"><i class="fas fa-plus"></i> New File</button>
      <button class="action-btn" id="new-folder-btn" style="margin-top:4px;"><i class="fas fa-folder-plus"></i> New Folder</button>
    </div>

    <!-- Center -->
    <div id="center">
      <div id="tabs-bar" role="tablist" aria-label="Open files"></div>
      <div id="editor-wrapper"><textarea id="editor-textarea"></textarea></div>
      <div id="output-container">
        <div id="output-header">
          <div class="tabs" role="tablist">
            <span role="tab" aria-selected="true" data-tab="output">Output</span>
            <span role="tab" aria-selected="false" data-tab="terminal">Terminal</span>
            <span role="tab" aria-selected="false" data-tab="preview">Preview</span>
          </div>
          <button class="clear-btn" id="clear-output" aria-label="Clear output"><i class="fas fa-times"></i> Clear</button>
        </div>
        <div id="output-content" role="log" aria-live="polite" aria-atomic="false">
          <div id="output-text"></div>
          <div id="terminal-container"></div>
          <iframe id="preview-iframe" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
        </div>
      </div>
    </div>

    <!-- Chat -->
    <div id="chat-panel">
      <div id="chat-header">
        <i class="fas fa-comment-dots"></i> DeepSeek AI
        <span class="status-badge"><i class="fas fa-circle" style="font-size:8px; color:#7ae0b0; margin-right:4px;"></i> free</span>
      </div>
      <div id="chat-messages" role="log" aria-live="polite" aria-atomic="false"></div>
      <div id="chat-input-area">
        <textarea id="chat-input" rows="1" placeholder="Ask for help..."></textarea>
        <button id="chat-send" aria-label="Send message"><i class="fas fa-arrow-right"></i></button>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div id="statusbar">
    <div class="item"><i class="fas fa-code"></i> <span class="highlight">Python</span></div>
    <div class="item"><i class="fas fa-file"></i> <span id="status-file">(none)</span></div>
    <div class="spacer"></div>
    <div class="item"><i class="fas fa-robot"></i> DeepSeek v4-pro</div>
    <div class="item"><span id="status-cursor">Ln 1, Col 1</span></div>
  </div>
</div>

<script>
  (function() {
    'use strict';

    // ─── CONFIG ──────────────────────────────────────────────────────────
    const PROXY_URL = 'https://battleground-deepseektoken.up.railway.app/api/chat';

    // ─── DOM REFS ──────────────────────────────────────────────────────
    const fileTreeEl = document.getElementById('file-tree');
    const tabsBar = document.getElementById('tabs-bar');
    const editorTextarea = document.getElementById('editor-textarea');
    const outputText = document.getElementById('output-text');
    const terminalContainer = document.getElementById('terminal-container');
    const previewIframe = document.getElementById('preview-iframe');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const statusFile = document.getElementById('status-file');
    const statusCursor = document.getElementById('status-cursor');

    // ─── PANEL ELEMENTS ──────────────────────────────────────────────
    const sidebar = document.getElementById('sidebar');
    const outputContainer = document.getElementById('output-container');
    const chatPanel = document.getElementById('chat-panel');
    const toggleSidebarBtn = document.getElementById('toggle-sidebar');
    const toggleOutputBtn = document.getElementById('toggle-output');
    const toggleChatBtn = document.getElementById('toggle-chat');
    const toggleMaximizeBtn = document.getElementById('toggle-maximize');

    // ─── STATE ────────────────────────────────────────────────────────
    let editor = null;
    let openTabs = [];
    let activeTabIndex = 0;
    let filesystem = {};
    let folderStructure = { '/': { type: 'folder', children: {} } };
    let pyodide = null;
    let isRunning = false;
    let conversation = [];
    let isChatProcessing = false;
    let dirty = false;

    // Terminal
    let terminal = null;
    let fitAddon = null;
    let terminalReady = false;
    let currentTerminalDir = '/';
    let terminalHistory = [];
    let terminalHistoryIndex = 0;
    let terminalInputBuffer = '';

    // Layout
    const LAYOUT_KEY = 'sandbox_layout_pro';
    let layoutState = {
      sidebarHidden: false,
      outputHidden: false,
      chatHidden: false,
      maximized: false,
    };

    // ─── CUSTOM MODAL (replaces confirm/alert) ──────────────────────
    function showModal({ title, message, input = false, inputPlaceholder = '', confirmText = 'OK', cancelText = 'Cancel' }) {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'custom-modal-overlay';
        overlay.innerHTML = `
          <div class="custom-modal">
            <h3>${title}</h3>
            <p>${message}</p>
            ${input ? `<input type="text" placeholder="${inputPlaceholder}" id="modal-input" />` : ''}
            <div class="modal-actions">
              ${cancelText ? `<button class="btn-secondary" id="modal-cancel">${cancelText}</button>` : ''}
              <button class="btn-primary" id="modal-confirm">${confirmText}</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        const inputEl = overlay.querySelector('#modal-input');
        if (inputEl) inputEl.focus();
        const confirmBtn = overlay.querySelector('#modal-confirm');
        const cancelBtn = overlay.querySelector('#modal-cancel');
        const resolveAndRemove = (value) => {
          overlay.remove();
          resolve(value);
        };
        confirmBtn.addEventListener('click', () => {
          resolveAndRemove(inputEl ? inputEl.value : true);
        });
        if (cancelBtn) cancelBtn.addEventListener('click', () => resolveAndRemove(inputEl ? null : false));
        if (inputEl) inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmBtn.click(); });
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) resolveAndRemove(inputEl ? null : false);
        });
      });
    }

    // ─── LAYOUT PERSISTENCE ──────────────────────────────────────────
    function loadLayout() {
      try {
        const saved = localStorage.getItem(LAYOUT_KEY);
        if (saved) layoutState = JSON.parse(saved);
      } catch (_) {}
    }
    function saveLayout() {
      localStorage.setItem(LAYOUT_KEY, JSON.stringify(layoutState));
    }
    function applyLayout() {
      sidebar.classList.toggle('hidden', layoutState.sidebarHidden);
      outputContainer.classList.toggle('hidden', layoutState.outputHidden);
      chatPanel.classList.toggle('hidden', layoutState.chatHidden);
      toggleSidebarBtn.classList.toggle('active', !layoutState.sidebarHidden);
      toggleOutputBtn.classList.toggle('active', !layoutState.outputHidden);
      toggleChatBtn.classList.toggle('active', !layoutState.chatHidden);
      if (layoutState.maximized) {
        sidebar.classList.add('hidden');
        outputContainer.classList.add('hidden');
        chatPanel.classList.add('hidden');
        toggleMaximizeBtn.classList.add('active');
        toggleMaximizeBtn.innerHTML = '<i class="fas fa-compress"></i>';
      } else {
        sidebar.classList.toggle('hidden', layoutState.sidebarHidden);
        outputContainer.classList.toggle('hidden', layoutState.outputHidden);
        chatPanel.classList.toggle('hidden', layoutState.chatHidden);
        toggleMaximizeBtn.classList.remove('active');
        toggleMaximizeBtn.innerHTML = '<i class="fas fa-expand"></i>';
      }
    }
    function togglePanel(panel) {
      if (layoutState.maximized) layoutState.maximized = false;
      if (panel === 'sidebar') layoutState.sidebarHidden = !layoutState.sidebarHidden;
      else if (panel === 'output') layoutState.outputHidden = !layoutState.outputHidden;
      else if (panel === 'chat') layoutState.chatHidden = !layoutState.chatHidden;
      layoutState.maximized = false;
      saveLayout();
      applyLayout();
    }
    function toggleMaximize() {
      layoutState.maximized = !layoutState.maximized;
      saveLayout();
      applyLayout();
      if (layoutState.maximized) {
        toggleMaximizeBtn.innerHTML = '<i class="fas fa-compress"></i>';
        toggleMaximizeBtn.classList.add('active');
      } else {
        toggleMaximizeBtn.innerHTML = '<i class="fas fa-expand"></i>';
        toggleMaximizeBtn.classList.remove('active');
      }
    }

    // ─── FILE SYSTEM PERSISTENCE ────────────────────────────────────
    function loadState() {
      try {
        const fs = localStorage.getItem('sandbox_fs_pro');
        if (fs) {
          const parsed = JSON.parse(fs);
          filesystem = parsed.files || {};
          folderStructure = parsed.folders || { '/': { type: 'folder', children: {} } };
        } else {
          filesystem['/main.py'] = 'print("Hello, World!")';
          filesystem['/index.html'] = '<h1>Hello</h1>';
          folderStructure['/'] = { type: 'folder', children: { 'main.py': true, 'index.html': true } };
        }
        const conv = localStorage.getItem('sandbox_chat_pro');
        if (conv) conversation = JSON.parse(conv);
        const tabs = localStorage.getItem('sandbox_tabs_pro');
        if (tabs) {
          const parsedTabs = JSON.parse(tabs);
          openTabs = parsedTabs.tabs || [];
          activeTabIndex = parsedTabs.active || 0;
        } else {
          const keys = Object.keys(filesystem);
          if (keys.length > 0) { openTabs = [keys[0]]; activeTabIndex = 0; }
        }
      } catch (_) {}
    }
    function saveState() {
      localStorage.setItem('sandbox_fs_pro', JSON.stringify({ files: filesystem, folders: folderStructure }));
      localStorage.setItem('sandbox_chat_pro', JSON.stringify(conversation));
      localStorage.setItem('sandbox_tabs_pro', JSON.stringify({ tabs: openTabs, active: activeTabIndex }));
    }

    // ─── FILE TREE RENDER ────────────────────────────────────────────
    function renderTree() {
      function renderNode(path, node) {
        const div = document.createElement('div');
        if (node.type === 'folder') {
          const header = document.createElement('div');
          header.className = 'tree-item';
          header.innerHTML = `
            <span class="folder-toggle"><i class="fas fa-chevron-down"></i></span>
            <span class="icon"><i class="fas fa-folder"></i></span>
            <span class="name">${path === '/' ? 'root' : path.split('/').pop()}</span>
          `;
          const childrenDiv = document.createElement('div');
          childrenDiv.className = 'tree-children';
          const keys = Object.keys(node.children || {}).sort();
          for (const child of keys) {
            const childPath = path + (path.endsWith('/') ? '' : '/') + child;
            const childNode = folderStructure[childPath];
            if (childNode) {
              childrenDiv.appendChild(renderNode(childPath, childNode));
            }
          }
          header.addEventListener('click', () => {
            const children = header.parentElement.querySelector('.tree-children');
            const icon = header.querySelector('.folder-toggle i');
            if (children.style.display === 'none') {
              children.style.display = '';
              icon.className = 'fas fa-chevron-down';
            } else {
              children.style.display = 'none';
              icon.className = 'fas fa-chevron-right';
            }
          });
          div.appendChild(header);
          div.appendChild(childrenDiv);
        } else {
          const item = document.createElement('div');
          item.className = 'tree-item file';
          if (openTabs.includes(path) && path === openTabs[activeTabIndex]) item.classList.add('active');
          const ext = path.split('.').pop();
          let icon = 'fa-regular fa-file';
          if (ext === 'py') icon = 'fa-brands fa-python';
          else if (ext === 'js') icon = 'fa-brands fa-js';
          else if (ext === 'html') icon = 'fa-brands fa-html5';
          else if (ext === 'css') icon = 'fa-brands fa-css3-alt';
          else if (ext === 'json') icon = 'fa-regular fa-file-code';
          item.innerHTML = `
            <span class="icon"><i class="${icon}"></i></span>
            <span class="name">${path.split('/').pop()}</span>
            <button class="del-btn" data-path="${path}" aria-label="Delete ${path}"><i class="fas fa-times"></i></button>
          `;
          item.addEventListener('click', (e) => {
            if (e.target.closest('.del-btn')) return;
            openFile(path);
          });
          const del = item.querySelector('.del-btn');
          if (del) {
            del.addEventListener('click', (e) => {
              e.stopPropagation();
              deleteFile(path);
            });
          }
          div.appendChild(item);
        }
        return div;
      }

      fileTreeEl.innerHTML = '';
      const root = folderStructure['/'];
      if (root) {
        fileTreeEl.appendChild(renderNode('/', root));
      }
    }

    // ─── FILE OPERATIONS ─────────────────────────────────────────────
    function sanitizeFilename(name) {
      return name.replace(/[^a-zA-Z0-9_.-]/g, '_').slice(0, 100);
    }

    function openFile(path, createIfMissing = true) {
      if (createIfMissing && !filesystem[path]) {
        const parts = path.split('/').filter(p => p);
        let current = '/';
        for (let i = 0; i < parts.length; i++) {
          const part = parts[i];
          const parent = current;
          const childPath = parent + (parent.endsWith('/') ? '' : '/') + part;
          if (i === parts.length - 1) {
            if (!folderStructure[parent]) folderStructure[parent] = { type: 'folder', children: {} };
            folderStructure[parent].children[part] = true;
            filesystem[childPath] = '';
          } else {
            if (!folderStructure[childPath]) {
              folderStructure[childPath] = { type: 'folder', children: {} };
              folderStructure[parent].children[part] = true;
            }
          }
          current = childPath;
        }
        saveState();
      }

      if (!openTabs.includes(path)) {
        openTabs.push(path);
      }
      activeTabIndex = openTabs.indexOf(path);
      renderTabs();
      renderTree();
      const content = filesystem[path] || '';
      editor.setValue(content);
      dirty = false;
      updateDirtyIndicator();
      const ext = path.split('.').pop();
      let mode = 'python';
      if (ext === 'js') mode = 'javascript';
      else if (ext === 'html') mode = 'htmlmixed';
      else if (ext === 'css') mode = 'css';
      else if (ext === 'json') mode = 'javascript';
      editor.setOption('mode', mode);
      statusFile.textContent = path;
      currentTerminalDir = path.substring(0, path.lastIndexOf('/')) || '/';
      saveState();
      updateCursorStatus();
    }

    function saveCurrentFile() {
      if (openTabs.length === 0) return;
      const path = openTabs[activeTabIndex];
      if (!path) return;
      filesystem[path] = editor.getValue();
      dirty = false;
      updateDirtyIndicator();
      saveState();
      const btn = document.getElementById('save-btn');
      if (btn) btn.style.color = '#7ae0b0';
      setTimeout(() => { if (btn) btn.style.color = ''; }, 300);
    }

    function deleteFile(path) {
      showModal({
        title: 'Delete File',
        message: `Are you sure you want to delete "${path}"?`,
        confirmText: 'Delete',
        cancelText: 'Cancel'
      }).then((confirmed) => {
        if (!confirmed) return;
        delete filesystem[path];
        const parts = path.split('/').filter(p => p);
        const parentPath = parts.slice(0, -1).join('/') || '/';
        const name = parts[parts.length-1];
        if (folderStructure[parentPath] && folderStructure[parentPath].children) {
          delete folderStructure[parentPath].children[name];
        }
        const idx = openTabs.indexOf(path);
        if (idx !== -1) {
          openTabs.splice(idx, 1);
          if (activeTabIndex >= openTabs.length) activeTabIndex = openTabs.length - 1;
          if (activeTabIndex < 0) activeTabIndex = 0;
        }
        if (openTabs.length === 0) {
          createFile('/main.py', 'print("Hello, World!")');
        } else {
          openFile(openTabs[activeTabIndex], false);
        }
        saveState();
        renderTree();
        renderTabs();
      });
    }

    function createFile(path, content = '') {
      if (filesystem[path] !== undefined) return;
      const parts = path.split('/').filter(p => p);
      let current = '/';
      for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        const parent = current;
        const childPath = parent + (parent.endsWith('/') ? '' : '/') + part;
        if (i === parts.length - 1) {
          if (!folderStructure[parent]) folderStructure[parent] = { type: 'folder', children: {} };
          folderStructure[parent].children[part] = true;
          filesystem[childPath] = content;
        } else {
          if (!folderStructure[childPath]) {
            folderStructure[childPath] = { type: 'folder', children: {} };
            folderStructure[parent].children[part] = true;
          }
        }
        current = childPath;
      }
      saveState();
      renderTree();
      openFile(path);
    }

    function createFolder(path) {
      if (folderStructure[path]) return;
      const parts = path.split('/').filter(p => p);
      let current = '/';
      for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        const parent = current;
        const childPath = parent + (parent.endsWith('/') ? '' : '/') + part;
        if (i === parts.length - 1) {
          if (!folderStructure[parent]) folderStructure[parent] = { type: 'folder', children: {} };
          folderStructure[parent].children[part] = true;
          folderStructure[childPath] = { type: 'folder', children: {} };
        } else {
          if (!folderStructure[childPath]) {
            folderStructure[childPath] = { type: 'folder', children: {} };
            folderStructure[parent].children[part] = true;
          }
        }
        current = childPath;
      }
      saveState();
      renderTree();
    }

    // ─── TABS RENDER ──────────────────────────────────────────────────
    function renderTabs() {
      tabsBar.innerHTML = '';
      openTabs.forEach((path, index) => {
        const tab = document.createElement('div');
        tab.className = 'tab' + (index === activeTabIndex ? ' active' : '');
        if (dirty && index === activeTabIndex) tab.classList.add('dirty');
        const name = path.split('/').pop();
        tab.innerHTML = `
          <span>${name}</span>
          <button class="close-tab" data-index="${index}" aria-label="Close ${name}"><i class="fas fa-times"></i></button>
        `;
        tab.addEventListener('click', (e) => {
          if (e.target.closest('.close-tab')) return;
          activeTabIndex = index;
          openFile(openTabs[activeTabIndex], false);
        });
        const closeBtn = tab.querySelector('.close-tab');
        closeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = parseInt(closeBtn.dataset.index);
          if (openTabs.length === 1) {
            showModal({ title: 'Cannot close', message: 'Cannot close the last tab.', confirmText: 'OK', cancelText: null });
            return;
          }
          openTabs.splice(idx, 1);
          if (activeTabIndex >= openTabs.length) activeTabIndex = openTabs.length - 1;
          if (activeTabIndex < 0) activeTabIndex = 0;
          saveState();
          openFile(openTabs[activeTabIndex], false);
          renderTabs();
          renderTree();
        });
        tabsBar.appendChild(tab);
      });
    }

    function updateDirtyIndicator() {
      document.querySelectorAll('.tab').forEach((tab, index) => {
        if (index === activeTabIndex) {
          tab.classList.toggle('dirty', dirty);
        }
      });
    }

    // ─── EDITOR INIT ──────────────────────────────────────────────────
    function initEditor() {
      editor = CodeMirror.fromTextArea(editorTextarea, {
        mode: 'python',
        theme: 'dracula',
        lineNumbers: true,
        matchBrackets: true,
        styleActiveLine: true,
        foldGutter: true,
        gutters: ['CodeMirror-foldgutter', 'CodeMirror-linenumbers'],
        indentUnit: 4,
        tabSize: 4,
        indentWithTabs: false,
        extraKeys: {
          'Ctrl-S': saveCurrentFile,
          'Cmd-S': saveCurrentFile,
          'Ctrl-Enter': runCode,
          'Cmd-Enter': runCode,
          'Ctrl-/': 'toggleComment',
          'Cmd-/': 'toggleComment',
          'Ctrl-Space': 'autocomplete',
          'Shift-9': function(cm) { cm.replaceSelection('('); },
          'Shift-0': function(cm) { cm.replaceSelection(')'); },
          'Ctrl-P': function() { alert('Search coming soon'); },
          'Cmd-P': function() { alert('Search coming soon'); },
        }
      });
      editor.on('cursorActivity', updateCursorStatus);
      editor.on('change', () => {
        if (openTabs.length > 0) {
          dirty = true;
          updateDirtyIndicator();
          clearTimeout(window._autoSaveTimer);
          window._autoSaveTimer = setTimeout(saveCurrentFile, 800);
        }
      });
      if (openTabs.length === 0) {
        const keys = Object.keys(filesystem);
        if (keys.length > 0) {
          openTabs = [keys[0]];
          activeTabIndex = 0;
        } else {
          createFile('/main.py', 'print("Hello, World!")');
        }
      }
      openFile(openTabs[activeTabIndex], false);
      renderTabs();
      renderTree();
    }

    function updateCursorStatus() {
      if (!editor) return;
      const pos = editor.getCursor();
      statusCursor.textContent = `Ln ${pos.line + 1}, Col ${pos.ch + 1}`;
    }

    // ─── PYODIDE INIT ──────────────────────────────────────────────────
    async function initPyodide() {
      statusText.textContent = 'Loading Pyodide...';
      statusDot.classList.remove('on');
      statusDot.classList.add('off');
      try {
        pyodide = await loadPyodide({
          indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.1/full/'
        });
        await pyodide.loadPackage(['micropip', 'numpy', 'pandas', 'matplotlib']);
        await pyodide.runPythonAsync(`
          import matplotlib
          matplotlib.use('module://matplotlib_pyodide.html5_canvas_backend')
          import matplotlib.pyplot as plt
        `);
        statusText.textContent = 'Pyodide ready';
        statusDot.classList.remove('off');
        statusDot.classList.add('on');
        appendOutput('Pyodide loaded successfully!\n', 'success');
      } catch (err) {
        statusText.textContent = 'Error';
        statusDot.classList.remove('on');
        statusDot.classList.add('off');
        appendOutput(`Failed to load Pyodide: ${err.message}\n`, 'error');
      }
    }

    // ─── OUTPUT / TERMINAL ──────────────────────────────────────────
    function appendOutput(text, className = '') {
      const lines = text.split('\n');
      for (const line of lines) {
        if (line.trim() === '') continue;
        const div = document.createElement('div');
        div.className = className || '';
        div.textContent = line;
        outputText.appendChild(div);
      }
      outputText.scrollTop = outputText.scrollHeight;
    }

    function clearOutput() {
      outputText.innerHTML = '';
    }

    // Terminal
    function initTerminal() {
      terminal = new Terminal({
        cursorBlink: true,
        fontSize: 13,
        fontFamily: '"JetBrains Mono", monospace',
        theme: {
          background: '#0b0e14',
          foreground: '#c8d0dc',
          cursor: '#7aa2f7',
          cursorAccent: '#0b0e14',
          selection: 'rgba(122,162,247,0.25)',
          black: '#181e28',
          red: '#f28b82',
          green: '#7ae0b0',
          yellow: '#f7dc6f',
          blue: '#7aa2f7',
          magenta: '#bb6bd9',
          cyan: '#5bc0de',
          white: '#e8edf5',
          brightBlack: '#6a7a90',
          brightRed: '#ff6b6b',
          brightGreen: '#8ce0a0',
          brightYellow: '#f7dc6f',
          brightBlue: '#7aa2f7',
          brightMagenta: '#d4a0e8',
          brightCyan: '#8ad8e8',
          brightWhite: '#f0f4fc'
        },
        convertEol: true,
        scrollback: 2000,
        tabStopWidth: 4,
      });
      fitAddon = new FitAddon.FitAddon();
      const webLinksAddon = new WebLinksAddon.WebLinksAddon();
      terminal.loadAddon(fitAddon);
      terminal.loadAddon(webLinksAddon);
      terminal.open(terminalContainer);
      fitAddon.fit();

      terminal.onKey((e) => {
        const ev = e.domEvent;
        const key = e.key;
        if (ev.key === 'Enter') {
          const line = terminalInputBuffer.trim();
          terminalInputBuffer = '';
          terminal.writeln('');
          if (line) {
            terminalHistory.push(line);
            terminalHistoryIndex = terminalHistory.length;
            handleTerminalCommand(line);
          } else {
            writeTerminalPrompt();
          }
          ev.preventDefault();
        } else if (ev.key === 'Backspace') {
          if (terminalInputBuffer.length > 0) {
            terminalInputBuffer = terminalInputBuffer.slice(0, -1);
            terminal.write('\x1b[1D\x1b[K');
          }
          ev.preventDefault();
        } else if (ev.key === 'ArrowUp') {
          if (terminalHistoryIndex > 0) {
            terminalHistoryIndex--;
            const hist = terminalHistory[terminalHistoryIndex] || '';
            terminal.write('\r\x1b[K');
            writeTerminalPrompt();
            terminal.write(hist);
            terminalInputBuffer = hist;
          }
          ev.preventDefault();
        } else if (ev.key === 'ArrowDown') {
          if (terminalHistoryIndex < terminalHistory.length - 1) {
            terminalHistoryIndex++;
            const hist = terminalHistory[terminalHistoryIndex] || '';
            terminal.write('\r\x1b[K');
            writeTerminalPrompt();
            terminal.write(hist);
            terminalInputBuffer = hist;
          } else {
            terminalHistoryIndex = terminalHistory.length;
            terminal.write('\r\x1b[K');
            writeTerminalPrompt();
            terminalInputBuffer = '';
          }
          ev.preventDefault();
        } else if (key.length === 1 && key.charCodeAt(0) >= 32) {
          terminalInputBuffer += key;
          terminal.write(key);
        }
      });

      terminalReady = true;
      writeTerminalPrompt();
    }

    function writeTerminalPrompt() {
      terminal.write(`\r\n\x1b[36m${currentTerminalDir} $ \x1b[0m`);
    }

    function handleTerminalCommand(cmd) {
      const parts = cmd.split(/\s+/);
      const command = parts[0];
      const args = parts.slice(1);

      if (command === 'ls') {
        const path = currentTerminalDir;
        const node = folderStructure[path];
        if (node && node.type === 'folder') {
          const children = Object.keys(node.children || {});
          if (children.length === 0) {
            terminal.writeln('(empty)');
          } else {
            children.forEach(child => {
              const childPath = path + (path.endsWith('/') ? '' : '/') + child;
              const isFolder = folderStructure[childPath]?.type === 'folder';
              terminal.writeln(`${isFolder ? '\x1b[36m' : ''}${child}${isFolder ? '/' : ''}\x1b[0m`);
            });
          }
        } else {
          terminal.writeln('\x1b[31mNot a directory\x1b[0m');
        }
        writeTerminalPrompt();
        return;
      }

      if (command === 'cd') {
        if (args.length === 0) {
          currentTerminalDir = '/';
          writeTerminalPrompt();
          return;
        }
        const target = args[0];
        let newPath;
        if (target.startsWith('/')) {
          newPath = target;
        } else {
          newPath = currentTerminalDir + (currentTerminalDir.endsWith('/') ? '' : '/') + target;
        }
        newPath = newPath.replace(/\/+/g, '/');
        if (folderStructure[newPath] && folderStructure[newPath].type === 'folder') {
          currentTerminalDir = newPath;
        } else {
          terminal.writeln(`\x1b[31mcd: ${target}: No such directory\x1b[0m`);
        }
        writeTerminalPrompt();
        return;
      }

      if (command === 'cat') {
        if (args.length === 0) {
          terminal.writeln('\x1b[31mUsage: cat <file>\x1b[0m');
          writeTerminalPrompt();
          return;
        }
        const filePath = currentTerminalDir + (currentTerminalDir.endsWith('/') ? '' : '/') + args[0];
        if (filesystem[filePath] !== undefined) {
          terminal.writeln(filesystem[filePath]);
        } else {
          terminal.writeln(`\x1b[31mcat: ${args[0]}: No such file\x1b[0m`);
        }
        writeTerminalPrompt();
        return;
      }

      if (command === 'run' || command === 'python' || command === 'node') {
        if (args.length === 0) {
          terminal.writeln(`\x1b[31mUsage: ${command} <file>\x1b[0m`);
          writeTerminalPrompt();
          return;
        }
        const filePath = currentTerminalDir + (currentTerminalDir.endsWith('/') ? '' : '/') + args[0];
        if (filesystem[filePath] === undefined) {
          terminal.writeln(`\x1b[31m${command}: ${args[0]}: No such file\x1b[0m`);
          writeTerminalPrompt();
          return;
        }
        const ext = filePath.split('.').pop();
        if (command === 'python' || (command === 'run' && ext === 'py')) {
          runPython(filePath);
        } else if (command === 'node' || (command === 'run' && ext === 'js')) {
          runJavaScript(filePath);
        } else if (command === 'run' && ext === 'html') {
          runHTML(filePath);
        } else {
          terminal.writeln(`\x1b[31mDon't know how to run ${ext} files\x1b[0m`);
          writeTerminalPrompt();
        }
        return;
      }

      if (command === 'clear') {
        terminal.clear();
        writeTerminalPrompt();
        return;
      }

      if (command === 'help') {
        terminal.writeln('\x1b[36mAvailable commands:\x1b[0m');
        terminal.writeln('  ls                  List files');
        terminal.writeln('  cd <dir>            Change directory');
        terminal.writeln('  cat <file>          Show file contents');
        terminal.writeln('  run <file>          Run Python/JS/HTML file');
        terminal.writeln('  python <file>       Run Python file');
        terminal.writeln('  node <file>         Run JS file');
        terminal.writeln('  clear               Clear terminal');
        terminal.writeln('  help                Show this help');
        writeTerminalPrompt();
        return;
      }

      terminal.writeln(`\x1b[31mCommand not found: ${command}\x1b[0m`);
      writeTerminalPrompt();
    }

    // ─── CODE EXECUTION ──────────────────────────────────────────────
    function runPython(filePath) {
      const code = filesystem[filePath] || '';
      if (!code.trim()) {
        appendOutput('No code to run.\n', 'info');
        return;
      }
      if (!pyodide) {
        appendOutput('Pyodide not ready.\n', 'error');
        return;
      }
      isRunning = true;
      document.getElementById('run-btn').disabled = true;
      appendOutput(`\n--- Running ${filePath} ---\n`, 'info');

      const captureCode = `
import sys
from io import StringIO
__stdout = StringIO()
__stderr = StringIO()
sys.stdout = __stdout
sys.stderr = __stderr
try:
    exec(${JSON.stringify(code)})
except Exception as e:
    print(e, file=sys.stderr)
finally:
    sys.stdout = sys.__stdout__
    sys.stderr = sys.__stderr__
    __output = __stdout.getvalue()
    __error = __stderr.getvalue()
    __output + __error
`;

      pyodide.runPythonAsync(captureCode).then(result => {
        if (result && result.trim()) {
          appendOutput(result, '');
        } else {
          appendOutput('(no output)\n', 'info');
        }
        appendOutput(`--- End of output ---\n`, 'info');
        isRunning = false;
        document.getElementById('run-btn').disabled = false;
      }).catch(err => {
        const errMsg = err.message || String(err);
        if (errMsg.includes('ModuleNotFoundError') || errMsg.includes('No module named')) {
          const match = errMsg.match(/No module named ['"]([^'"]+)['"]/);
          if (match) {
            const moduleName = match[1];
            appendOutput(`[WARNING] Library '${moduleName}' is not installed.\n`, 'warn');
            appendOutput(`To install it, add this to your code:\n`, 'warn');
            appendOutput(`import micropip\nawait micropip.install('${moduleName}')\n`, 'info');
            appendOutput(`Then import it after installation.\n`, 'warn');
          } else {
            appendOutput(`Error: ${errMsg}\n`, 'error');
          }
        } else {
          appendOutput(`Error: ${errMsg}\n`, 'error');
        }
        isRunning = false;
        document.getElementById('run-btn').disabled = false;
      });
    }

    function runJavaScript(filePath) {
      const code = filesystem[filePath] || '';
      if (!code.trim()) {
        appendOutput('No code to run.\n', 'info');
        return;
      }
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
      const win = iframe.contentWindow;
      const oldLog = win.console.log;
      const oldError = win.console.error;
      let output = '';
      win.console.log = function(...args) {
        output += args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ') + '\n';
      };
      win.console.error = function(...args) {
        output += 'Error: ' + args.map(a => String(a)).join(' ') + '\n';
      };
      try {
        const result = win.eval(code);
        if (result !== undefined) {
          output += '→ ' + (typeof result === 'object' ? JSON.stringify(result, null, 2) : String(result)) + '\n';
        }
      } catch (e) {
        output += 'Error: ' + e.message + '\n';
      }
      win.console.log = oldLog;
      win.console.error = oldError;
      document.body.removeChild(iframe);
      appendOutput(`\n--- Running ${filePath} ---\n`, 'info');
      appendOutput(output.trim() || '(no output)\n', '');
      appendOutput(`--- End of output ---\n`, 'info');
    }

    function runHTML(filePath) {
      const html = filesystem[filePath] || '';
      if (!html.trim()) {
        appendOutput('No content to preview.\n', 'info');
        return;
      }
      showPreviewTab();
      previewIframe.src = 'data:text/html;charset=utf-8,' + encodeURIComponent(html);
      appendOutput(`\n--- Previewing ${filePath} ---\n`, 'info');
    }

    function runCode() {
      if (openTabs.length === 0) return;
      const path = openTabs[activeTabIndex];
      if (!path) return;
      const ext = path.split('.').pop();
      if (ext === 'py') runPython(path);
      else if (ext === 'js') runJavaScript(path);
      else if (ext === 'html') runHTML(path);
      else appendOutput(`\x1b[31mDon't know how to run .${ext} files\x1b[0m\n`, 'error');
    }

    // ─── TAB SWITCHING ──────────────────────────────────────────────
    function showOutputTab() {
      outputText.style.display = '';
      terminalContainer.style.display = 'none';
      previewIframe.style.display = 'none';
      document.querySelectorAll('.tabs span').forEach(t => {
        t.setAttribute('aria-selected', 'false');
        t.classList.remove('active');
      });
      const tab = document.querySelector('.tabs span[data-tab="output"]');
      if (tab) { tab.setAttribute('aria-selected', 'true'); tab.classList.add('active'); }
    }
    function showTerminalTab() {
      outputText.style.display = 'none';
      terminalContainer.style.display = '';
      previewIframe.style.display = 'none';
      document.querySelectorAll('.tabs span').forEach(t => {
        t.setAttribute('aria-selected', 'false');
        t.classList.remove('active');
      });
      const tab = document.querySelector('.tabs span[data-tab="terminal"]');
      if (tab) { tab.setAttribute('aria-selected', 'true'); tab.classList.add('active'); }
      if (terminalReady) fitAddon.fit();
    }
    function showPreviewTab() {
      outputText.style.display = 'none';
      terminalContainer.style.display = 'none';
      previewIframe.style.display = '';
      document.querySelectorAll('.tabs span').forEach(t => {
        t.setAttribute('aria-selected', 'false');
        t.classList.remove('active');
      });
      const tab = document.querySelector('.tabs span[data-tab="preview"]');
      if (tab) { tab.setAttribute('aria-selected', 'true'); tab.classList.add('active'); }
    }

    // ─── CHAT (with AbortController and timeout) ──────────────────
    async function fetchWithTimeout(url, options = {}, timeoutMs = 30000) {
      const controller = new AbortController();
      options.signal = controller.signal;
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, options);
        clearTimeout(timer);
        return res;
      } catch (err) {
        clearTimeout(timer);
        throw err;
      }
    }

    async function sendChatMessage(userMessage) {
      if (isChatProcessing) return;
      if (!userMessage.trim()) return;

      addMessage('user', userMessage);
      chatInput.value = '';
      chatInput.style.height = 'auto';

      conversation.push({ role: 'user', content: userMessage });
      saveState();

      isChatProcessing = true;
      chatSend.disabled = true;

      const systemPrompt = 'You are an expert developer and coding assistant. Help users write, debug, and understand code in any language. Provide clear explanations and code examples. Be concise but thorough.';
      const messages = [ { role: 'system', content: systemPrompt }, ...conversation ];

      try {
        const response = await fetchWithTimeout(PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages,
            model: 'deepseek-v4-pro',
            stream: true,
            temperature: 0.7,
            reasoning_effort: 'medium'
          })
        }, 30000);

        if (!response.ok) {
          let errMsg = `HTTP ${response.status}`;
          try { const data = await response.json(); if (data.error) errMsg = data.error; } catch (_) {}
          throw new Error(errMsg);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullContent = '';
        let buffer = '';

        const assistantMsg = addMessage('assistant', '', true);

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          buffer += chunk;
          // SSE lines: split by \n, keep incomplete line
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (line.trim() === '') continue;
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') continue;
              try {
                const parsed = JSON.parse(data);
                const delta = parsed.choices[0].delta;
                if (delta.content) {
                  fullContent += delta.content;
                  const contentSpan = assistantMsg.querySelector('.msg-content');
                  if (contentSpan) {
                    contentSpan.innerHTML = marked.parse(fullContent);
                    contentSpan.querySelectorAll('pre code').forEach(block => {
                      hljs.highlightElement(block);
                    });
                  }
                  chatMessages.scrollTop = chatMessages.scrollHeight;
                }
              } catch (_) {
                // If parsing fails, treat as raw text (fallback)
                if (data && data !== '[DONE]') {
                  fullContent += data;
                  const contentSpan = assistantMsg.querySelector('.msg-content');
                  if (contentSpan) {
                    contentSpan.innerHTML = marked.parse(fullContent);
                    contentSpan.querySelectorAll('pre code').forEach(block => {
                      hljs.highlightElement(block);
                    });
                  }
                }
              }
            }
          }
        }

        if (fullContent) {
          conversation.push({ role: 'assistant', content: fullContent });
          saveState();
        } else {
          const contentSpan = assistantMsg.querySelector('.msg-content');
          if (contentSpan) contentSpan.textContent = 'Sorry, I got an empty response.';
        }

      } catch (err) {
        if (err.name === 'AbortError') {
          addMessage('assistant', 'The request timed out. Please try again.');
        } else {
          addMessage('assistant', `Error: ${err.message}`);
        }
      } finally {
        isChatProcessing = false;
        chatSend.disabled = false;
        chatInput.focus();
      }
    }

    function addMessage(role, content, placeholder = false) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const avatar = document.createElement('span');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '🧑‍💻' : '🤖';
      div.appendChild(avatar);

      const label = document.createElement('span');
      label.className = 'role-label';
      label.textContent = role === 'user' ? 'You' : 'Assistant';
      div.appendChild(label);

      const contentSpan = document.createElement('span');
      contentSpan.className = 'msg-content';
      if (role === 'assistant' && !placeholder) {
        contentSpan.innerHTML = marked.parse(content);
        contentSpan.querySelectorAll('pre code').forEach(block => {
          hljs.highlightElement(block);
        });
      } else {
        contentSpan.textContent = content;
      }
      div.appendChild(contentSpan);

      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      if (!placeholder) return div;
      div._contentSpan = contentSpan;
      return div;
    }

    async function explainCode() {
      if (openTabs.length === 0) return;
      const path = openTabs[activeTabIndex];
      if (!path) return;
      const code = editor.getValue();
      if (!code.trim()) {
        appendOutput('No code to explain.\n', 'info');
        return;
      }
      const prompt = `Explain this code (${path}) in detail:\n\n${code}`;
      await sendChatMessage(prompt);
    }

    // ─── INIT ──────────────────────────────────────────────────────────
    function init() {
      loadState();
      loadLayout();
      initEditor();
      applyLayout();

      // Panel toggles
      toggleSidebarBtn.addEventListener('click', () => togglePanel('sidebar'));
      toggleOutputBtn.addEventListener('click', () => togglePanel('output'));
      toggleChatBtn.addEventListener('click', () => togglePanel('chat'));
      toggleMaximizeBtn.addEventListener('click', toggleMaximize);

      // Editor toolbar (inject if missing)
      const toolbar = document.getElementById('editor-toolbar');
      if (!toolbar) {
        const newToolbar = document.createElement('div');
        newToolbar.id = 'editor-toolbar';
        newToolbar.style.cssText = 'flex-shrink:0; height:36px; background:rgba(11,14,20,0.8); border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; padding:0 12px; gap:12px;';
        newToolbar.innerHTML = `
          <div class="label">File: <span id="current-file-label">${openTabs[activeTabIndex] || '(none)'}</span></div>
          <div class="spacer" style="flex:1;"></div>
          <button id="save-btn"><i class="fas fa-save"></i> Save</button>
          <button class="run" id="run-btn"><i class="fas fa-play"></i> Run</button>
          <button class="explain" id="explain-btn"><i class="fas fa-comment"></i> Explain</button>
        `;
        document.getElementById('center').insertBefore(newToolbar, document.getElementById('editor-wrapper'));
      }

      document.getElementById('save-btn')?.addEventListener('click', saveCurrentFile);
      document.getElementById('run-btn')?.addEventListener('click', runCode);
      document.getElementById('explain-btn')?.addEventListener('click', explainCode);

      // New file/folder
      document.getElementById('new-file-btn').addEventListener('click', async () => {
        const result = await showModal({
          title: 'New File',
          message: 'Enter file path (e.g., /src/app.js)',
          input: true,
          inputPlaceholder: '/path/to/file.py',
          confirmText: 'Create',
          cancelText: 'Cancel'
        });
        if (result) {
          const rawPath = result.trim();
          if (!rawPath) return;
          const path = rawPath.startsWith('/') ? rawPath : '/' + rawPath;
          const sanitized = sanitizeFilename(path);
          if (filesystem[sanitized] !== undefined) {
            showModal({ title: 'Error', message: 'File already exists.', confirmText: 'OK', cancelText: null });
          } else {
            createFile(sanitized, '');
          }
        }
      });

      document.getElementById('new-folder-btn').addEventListener('click', async () => {
        const result = await showModal({
          title: 'New Folder',
          message: 'Enter folder path (e.g., /src)',
          input: true,
          inputPlaceholder: '/path/to/folder',
          confirmText: 'Create',
          cancelText: 'Cancel'
        });
        if (result) {
          const rawPath = result.trim();
          if (!rawPath) return;
          const path = rawPath.startsWith('/') ? rawPath : '/' + rawPath;
          const sanitized = sanitizeFilename(path);
          if (folderStructure[sanitized]) {
            showModal({ title: 'Error', message: 'Folder already exists.', confirmText: 'OK', cancelText: null });
          } else {
            createFolder(sanitized);
          }
        }
      });

      // Output tabs
      document.querySelectorAll('.tabs span').forEach(tab => {
        tab.addEventListener('click', () => {
          const tabName = tab.dataset.tab;
          if (tabName === 'output') showOutputTab();
          else if (tabName === 'terminal') showTerminalTab();
          else if (tabName === 'preview') showPreviewTab();
        });
      });

      document.getElementById('clear-output').addEventListener('click', clearOutput);

      // Chat
      chatSend.addEventListener('click', () => {
        sendChatMessage(chatInput.value);
      });
      chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          chatSend.click();
        }
      });
      chatInput.addEventListener('input', () => {
        chatInput.style.height = 'auto';
        chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
      });

      // Load previous chat
      conversation.forEach(msg => {
        addMessage(msg.role, msg.content);
      });

      // Init Pyodide and Terminal
      initPyodide();
      initTerminal();

      window.addEventListener('resize', () => {
        if (editor) editor.refresh();
        if (terminalReady) fitAddon.fit();
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  })();
</script>
